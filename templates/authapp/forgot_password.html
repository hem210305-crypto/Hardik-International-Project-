<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — Hardik International</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">
</head>
<body class="d-flex flex-column">
<div class="page page-center">
  <div class="container container-tight py-4">
    <div class="text-center mb-4">
      <h2 class="h2">Hardik International</h2>
      <p class="text-muted">Password Recovery</p>
    </div>
    <div class="card card-md">
      <div class="card-body">
        <h3 class="card-title text-center mb-2">Forgot Password</h3>
        <p class="text-muted text-center mb-4">
          Enter your registered email address and we'll send you a reset link.
        </p>

        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required autofocus>
          </div>
          <div class="form-footer">
            <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
          </div>
        </form>
      </div>
    </div>

    <div class="text-center text-muted mt-3">
      Remembered it? <a href="{% url 'login' %}">Back to Login</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
</body>
</html>
